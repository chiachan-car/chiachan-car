<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>佳展車業｜嘉義中古車</title>

<style>
body{margin:0;font-family:"Noto Sans TC",Arial;background:#f8f9fb;color:#222}
header{background:#fff;border-bottom:1px solid #eee}
.wrap{max-width:1100px;margin:auto;padding:0 20px}
.nav{display:flex;justify-content:space-between;align-items:center;padding:20px 0}
.logo{font-size:42px;font-weight:900;color:#f1c40f}

.btn{padding:10px 16px;border-radius:10px;text-decoration:none;font-weight:bold;border:1px solid #ddd}
.btn.yellow{background:#f1c40f;color:#000;border:none}
.btn.gray{background:#eee;color:#000}

.hero{padding:50px 0;text-align:center}
.hero h1{font-size:40px}
.hero span{color:#f1c40f}

.search{background:#fff;border:1px solid #eee;border-radius:16px;padding:20px;margin:20px 0}
.filters{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

input,select{padding:10px;border-radius:10px;border:1px solid #ddd}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}

.card{background:#fff;border:1px solid #eee;border-radius:14px;overflow:hidden}
.card img{width:100%;height:200px;object-fit:cover;background:#ddd}
.card-body{padding:15px}

.tag{display:inline-block;background:#fff3cd;color:#b38f00;padding:4px 10px;border-radius:20px;font-size:12px;margin-bottom:8px}

</style>
</head>

<body>

<header>
<div class="wrap nav">
<div class="logo">佳展車業</div>
<div>
<a class="btn yellow" href="https://line.me/ti/p/gPVPrAJoWw" target="_blank">LINE詢問</a>
<a class="btn gray" href="tel:0928998220">電話</a>
</div>
</div>
</header>

<section class="hero">
<div class="wrap">
<h1>找車不用滑到眼花，<span>條件選好</span>再慢慢看</h1>
</div>
</section>

<main class="wrap">

<section class="search">
<h2>找車輛</h2>
<div class="filters">
<select id="brand"><option value="">全部廠牌</option></select>
<input id="keyword" placeholder="搜尋車型">
<input id="maxPrice" placeholder="最高價格">
<input id="minYear" placeholder="最低年份">
</div>
<p id="count">載入中...</p>
</section>

<section class="grid" id="cars"></section>

</main>

<script>

const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRbBfSzBOCFxFGCtZLgv6OHT4X0n0bMwOP_asAYUv1wro7ADaZF9VR0KkHzXOBuf1l78NOL2kCrNIub/pubhtml";

let cars=[];

function getImg(url){
 if(!url) return "";
 let id=url.match(/[-\w]{25,}/);
 return id?`https://drive.google.com/uc?export=view&id=${id[0]}`:url;
}

fetch(SHEET_URL)
.then(r=>r.text())
.then(html=>{
 let doc=new DOMParser().parseFromString(html,"text/html");
 let rows=[...doc.querySelectorAll("table tr")];

 cars=rows.slice(1).map(r=>{
 let t=[...r.querySelectorAll("td")].map(x=>x.textContent.trim());

 return {
 brand:t[1],
 model:t[2],
 year:t[3],
 price:t[4],
 mileage:t[5],
 color:t[6],
 feature:t[7],
 photo:getImg(t[8])
 };
 }).filter(c=>c.brand);

 initBrand();
 render();
});

function initBrand(){
 let set=[...new Set(cars.map(c=>c.brand))];
 set.forEach(b=>{
 let o=document.createElement("option");
 o.value=b;o.textContent=b;
 document.getElementById("brand").appendChild(o);
 });
}

function render(){
 let list=cars;
 document.getElementById("count").innerText="目前："+list.length+"台";

 document.getElementById("cars").innerHTML=list.map(c=>`
 <div class="card">
 ${c.photo?`<img src="${c.photo}">`:``}
 <div class="card-body">
 <div class="tag">上架中</div>
 <h3>${c.brand} ${c.model}</h3>
 年份：${c.year}<br>
 價格：${c.price}<br>
 里程：${c.mileage}<br>
 顏色：${c.color}<br>
 ${c.feature}
 </div>
 </div>
 `).join("");
}

</script>

</body>
</html>
